<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NerdMiners">
<meta name="theme-color" content="#1a1a18">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>NerdMiners</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ececea;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9e9e9a;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --green: #1D9E75; --red: #E24B4A; --gray: #888780;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0efe8; --text2: #a0a09a; --text3: #6a6a65;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    }
  }
  body {
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    background: var(--bg2); color: var(--text);
    min-height: 100vh; min-height: -webkit-fill-available;
    padding: env(safe-area-inset-top,1rem) 1rem env(safe-area-inset-bottom,1rem) 1rem;
  }
  .dash { max-width: 500px; margin: 0 auto; padding-top: 0.5rem; }
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
  .header h1 { font-size:14px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; }
  .btn {
    background:none; border:0.5px solid var(--border2); border-radius:var(--radius);
    padding:6px 12px; font-size:11px; color:var(--text2); cursor:pointer;
    font-family:inherit; -webkit-tap-highlight-color:transparent;
  }
  .btn:active { background:var(--bg3); }
  .btn.danger { color:var(--red); }
  .install-banner {
    background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg);
    padding:0.75rem 1rem; margin-bottom:0.75rem;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .install-banner p { font-size:11px; color:var(--text2); line-height:1.5; }
  .install-banner p span { color:var(--text); font-weight:500; }
  .dismiss-btn { background:none; border:none; color:var(--text3); font-size:18px; cursor:pointer; flex-shrink:0; }
  .miner-card {
    background:var(--bg); border:0.5px solid var(--border);
    border-left:2px solid var(--gray); border-radius:var(--radius-lg);
    padding:1rem; margin-bottom:.75rem; transition:border-color 0.3s;
  }
  .miner-card.online { border-left-color:var(--green); }
  .miner-card.offline { border-left-color:var(--red); }
  .card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:.75rem; }
  .name-row { display:flex; align-items:center; gap:8px; }
  .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; background:var(--gray); transition:background 0.3s; }
  .dot.online { background:var(--green); }
  .dot.offline { background:var(--red); }
  .dot.loading { animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .miner-name { font-size:13px; font-weight:500; color:var(--text); }
  .miner-sub { font-size:10px; color:var(--text3); margin-top:1px; }
  .ebtn {
    background:none; border:none; color:var(--text3); cursor:pointer;
    font-size:11px; padding:3px 8px; border-radius:5px; font-family:inherit;
    -webkit-tap-highlight-color:transparent;
  }
  .ebtn:active { background:var(--bg2); }
  .edit-panel { background:var(--bg2); border-radius:var(--radius); padding:10px; margin-bottom:.6rem; display:none; }
  .edit-panel.open { display:block; }
  .edit-hint { font-size:10px; color:var(--text3); margin-bottom:6px; line-height:1.5; }
  .edit-row { display:flex; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
  .edit-row input {
    font-size:11px; font-family:inherit; background:var(--bg);
    border:0.5px solid var(--border2); border-radius:var(--radius);
    padding:6px 8px; color:var(--text); outline:none; -webkit-appearance:none;
  }
  .edit-row input:focus { border-color:var(--green); }
  .inp-name { width:110px; }
  .inp-ip { width:130px; }
  .inp-alias { flex:1; min-width:120px; }
  .edit-actions { display:flex; gap:6px; margin-top:4px; }
  .edit-actions .btn { flex:1; text-align:center; }
  .section-label { font-size:9px; text-transform:uppercase; letter-spacing:.07em; color:var(--text3); margin-bottom:5px; }
  .stats-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:7px; margin-bottom:.6rem; }
  .stat { background:var(--bg2); border-radius:var(--radius); padding:7px 9px; }
  .stat-label { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:2px; }
  .stat-value { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  hr.divider { border:none; border-top:0.5px solid var(--border); margin:.6rem 0; }
  .pool-embed-wrap { border-radius:var(--radius); overflow:hidden; width:100%; }
  .pool-embed-wrap iframe { display:block; width:100%; height:340px; border:none; }
  .err { font-size:10px; color:var(--red); margin-top:5px; }
  .add-btn {
    width:100%; background:none; border:0.5px dashed var(--border2);
    border-radius:var(--radius-lg); padding:.75rem; font-size:12px;
    color:var(--text3); cursor:pointer; font-family:inherit; margin-bottom:.75rem;
    -webkit-tap-highlight-color:transparent;
  }
  .add-btn:active { background:var(--bg3); }
  .ts { text-align:center; font-size:10px; color:var(--text3); margin-top:.25rem; letter-spacing:.04em; padding-bottom:2rem; }
</style>
</head>
<body>
<div class="dash">
  <div class="header">
    <h1>⛏ NerdMiners</h1>
    <button class="btn" onclick="refreshAll()">↻ Refresh</button>
  </div>
  <div id="install-banner" style="display:none;" class="install-banner">
    <p>Tap <span>Share → Add to Home Screen</span> in Safari to install as an app</p>
    <button class="dismiss-btn" onclick="dismissBanner()">×</button>
  </div>
  <div id="mc"></div>
  <button class="add-btn" onclick="addMiner()">+ add miner</button>
  <div class="ts" id="ts"></div>
</div>
<script>
const HMPOOL_EMBED = "https://hmpool.io/embed.html?alias=";

function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let miners = ls("nm_miners_v3", [
  {id:1,name:"Miner 1",ip:"",alias:""},
  {id:2,name:"Miner 2",ip:"",alias:""},
  {id:3,name:"Miner 3",ip:"",alias:""},
]);
miners = miners.map(m=>({...m, data:null, status:"idle", error:null}));
let nid = Math.max(...miners.map(m=>m.id), 0) + 1;

function persist(){
  lsSet("nm_miners_v3", miners.map(m=>({id:m.id,name:m.name,ip:m.ip,alias:m.alias||""})));
}

const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
if(isIOS && !window.navigator.standalone && !ls("nm_banner_dismissed",false)){
  document.getElementById("install-banner").style.display = "flex";
}
function dismissBanner(){
  document.getElementById("install-banner").style.display="none";
  lsSet("nm_banner_dismissed",true);
}

function parseH(s){
  if(s===null||s===undefined)return null;
  if(typeof s==="number")return s;
  s=String(s).trim(); const n=parseFloat(s); if(isNaN(n))return null;
  const u=s.toUpperCase();
  if(u.includes("T"))return n*1e12; if(u.includes("G"))return n*1e9;
  if(u.includes("M"))return n*1e6; if(u.includes("K"))return n*1e3;
  return n;
}
function fmtH(h){
  if(h===null||h===undefined)return "—";
  if(h>=1e12)return (h/1e12).toFixed(2)+" TH/s";
  if(h>=1e9)return (h/1e9).toFixed(2)+" GH/s";
  if(h>=1e6)return (h/1e6).toFixed(2)+" MH/s";
  if(h>=1e3)return (h/1e3).toFixed(2)+" KH/s";
  return h.toFixed(0)+" H/s";
}
function fmtUptime(d){
  if(!d)return "—";
  const s=d.uptime??d.up_time??d.runtime;
  if(s==null)return "—";
  const dy=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);
  if(dy>0)return dy+"d "+h+"h"; if(h>0)return h+"h "+m+"m"; return m+"m";
}
function fmtShares(d){
  if(!d)return "—";
  const f=d.shares_accepted??d.accepted_shares??d.valid_shares;
  return f!==undefined?String(f):"—";
}
function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function render(){
  const mc=document.getElementById("mc");
  mc.innerHTML="";
  miners.forEach(m=>{
    const d=m.data;
    const localHr=d?parseH(d.hashrate??d.hashes_per_second??d.hash_rate):null;
    const subParts=[];
    if(m.ip)subParts.push(m.ip);
    if(m.alias)subParts.push("alias: "+m.alias);

    let deviceSection="";
    if(m.ip){
      deviceSection=`
        <div class="section-label">Device</div>
        <div class="stats-grid">
          <div class="stat"><div class="stat-label">Hashrate</div><div class="stat-value">${fmtH(localHr)}</div></div>
          <div class="stat"><div class="stat-label">Uptime</div><div class="stat-value">${fmtUptime(d)}</div></div>
          <div class="stat"><div class="stat-label">Shares</div><div class="stat-value">${fmtShares(d)}</div></div>
        </div>`;
    }

    let poolSection="";
    if(m.alias){
      poolSection=`
        <hr class="divider">
        <div class="section-label">Pool · hmpool.io</div>
        <div class="pool-embed-wrap">
          <iframe src="${HMPOOL_EMBED}${encodeURIComponent(m.alias)}&size=full"
            scrolling="no" loading="lazy" title="hmpool ${esc(m.alias)}"></iframe>
        </div>`;
    }

    const card=document.createElement("div");
    card.className="miner-card "+(m.status||"idle");
    card.innerHTML=`
      <div class="card-top">
        <div class="name-row">
          <div class="dot ${m.status}"></div>
          <div>
            <div class="miner-name">${esc(m.name)}</div>
            <div class="miner-sub">${subParts.length?esc(subParts.join(" · ")):"not configured"}</div>
          </div>
        </div>
        <button class="ebtn" onclick="toggleEdit(${m.id})">edit</button>
      </div>
      <div class="edit-panel" id="ep-${m.id}">
        <div class="edit-hint">IP = local device (same WiFi only) · Alias = your hmpool.io username</div>
        <div class="edit-row">
          <input class="inp-name" type="text" placeholder="Label" id="n-${m.id}" value="${esc(m.name)}">
          <input class="inp-ip" type="text" placeholder="192.168.1.x" id="ip-${m.id}" value="${esc(m.ip)}" inputmode="decimal">
        </div>
        <div class="edit-row">
          <input class="inp-alias" type="text" placeholder="hmpool alias (e.g. lilyella)" id="a-${m.id}" value="${esc(m.alias||"")}" autocorrect="off" autocapitalize="none" spellcheck="false">
        </div>
        <div class="edit-actions">
          <button class="btn" onclick="saveEdit(${m.id})">save &amp; poll</button>
          <button class="btn danger" onclick="removeMiner(${m.id})">remove</button>
        </div>
      </div>
      ${deviceSection}
      ${poolSection}
      ${m.error?`<div class="err">${esc(m.error)}</div>`:""}
    `;
    mc.appendChild(card);
  });
}

function toggleEdit(id){document.getElementById("ep-"+id).classList.toggle("open");}

function saveEdit(id){
  const m=miners.find(x=>x.id===id); if(!m)return;
  m.name=document.getElementById("n-"+id).value.trim()||m.name;
  m.ip=document.getElementById("ip-"+id).value.trim();
  m.alias=document.getElementById("a-"+id).value.trim();
  persist();
  document.getElementById("ep-"+id).classList.remove("open");
  render();
  if(m.ip)fetchMiner(id);
}

function addMiner(){
  const id=nid++;
  miners.push({id,name:"Miner "+id,ip:"",alias:"",data:null,status:"idle",error:null});
  persist();render();
  document.getElementById("ep-"+id).classList.add("open");
}

function removeMiner(id){
  if(!confirm("Remove this miner?"))return;
  miners=miners.filter(m=>m.id!==id); persist();render();
}

async function fetchMiner(id){
  const m=miners.find(x=>x.id===id); if(!m||!m.ip)return;
  m.status="loading";m.error=null;render();
  const base=(m.ip.startsWith("http")?m.ip:"http://"+m.ip).replace(/\/+$/,"");
  const urls=[base+"/api/stats",base+"/stats",base+"/api",base+"/"];
  let found=false;
  for(const url of urls){
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(4000),headers:{Accept:"application/json"}});
      if(!r.ok)continue;
      if(!(r.headers.get("content-type")||"").includes("json"))continue;
      m.data=await r.json(); m.status="online"; m.error=null; found=true; break;
    }catch(e){}
  }
  if(!found){
    m.status="offline";
    m.error="Can't reach device — HTTP is blocked over HTTPS. Pool stats still work.";
    m.data=null;
  }
  render();updateTs();
}

function refreshAll(){
  miners.forEach(m=>{ if(m.ip)fetchMiner(m.id); });
  updateTs();
}

function updateTs(){
  document.getElementById("ts").textContent="last updated "+new Date().toLocaleTimeString();
}

render();
if(miners.some(m=>m.ip))refreshAll();
setInterval(()=>{ miners.forEach(m=>{ if(m.ip)fetchMiner(m.id); }); }, 60000);

if("serviceWorker" in navigator){ navigator.serviceWorker.register("/sw.js").catch(()=>{}); }
</script>
</body>
</html>
